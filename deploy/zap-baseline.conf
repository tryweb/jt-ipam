# jt-ipam — ZAP baseline triage (accepted, justified exceptions)
# Used as: zap-baseline.py -t https://<host>/ -c zap-baseline.conf
# Format: <ruleId>	<IGNORE|WARN|FAIL>	<justification>
# Release gate = NO findings beyond this documented baseline (no NEW high/med/low).
# Each line below is an accepted trade-off inherent to the UI framework / SPA / the IPAM domain.
10055	IGNORE	CSP style-src 'unsafe-inline' — required by Naive UI (css-render runtime styles + inline style attrs). script-src is strict 'self', so CSS injection cannot execute JS. Removing needs a per-request nonce pipeline, impractical under static-nginx.
2	IGNORE	Private IP Disclosure — RFC1918 values are example placeholders in IPAM forms / CIDR hints (an IPAM manages private networks); not real infrastructure.
10096	IGNORE	Timestamp Disclosure (Unix) — frontend build/version stamp, not sensitive.
10015	IGNORE	Re-examine Cache-control — static hashed SPA assets, intended long-cache.
10049	IGNORE	Storable and Cacheable Content — static hashed SPA assets.
10024	IGNORE	Storable but Non-Cacheable Content — informational, static assets.
10109	IGNORE	Modern Web Application — informational SPA detection, not a vulnerability.
