# jt-ipam web tier (Docker): serve the built frontend + reverse-proxy /api to the backend.
# TLS is enforced (the app sets Secure cookies + https public URLs).

server {
    listen 80;
    server_name _;
    # redirect everything to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;
    server_tokens off;            # keep in the server block (not http) — avoids duplicate-directive errors

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 32m;     # CSV imports / cert uploads

    root /usr/share/nginx/html;
    index index.html;

    # API → backend container (uvicorn, plain HTTP inside the compose network)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
