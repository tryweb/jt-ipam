# =============================================================================
# jt-ipam — nginx proxy snippet (external reverse proxy mode)
#
# Used together with jt-ipam-external-proxy.conf. Install to /etc/nginx/snippets/jt-ipam-proxy.conf.
#
# Key difference vs the default jt-ipam-proxy.conf:
#   X-Forwarded-Proto is sent as $jt_fwd_proto (the site's map of
#   $http_x_forwarded_proto, defaulting empty values to https) instead of $scheme.
#
#   Why: this local nginx receives plain HTTP, so $scheme is always "http". Forwarding
#   "http" downstream makes FastAPI think the connection is insecure → Secure session
#   cookies won't set / OIDC callbacks fail. Using the external NGINX's X-Forwarded-Proto
#   (https) forwards the correct scheme to the backend.
# =============================================================================
proxy_set_header Host               $host;
proxy_set_header X-Real-IP          $remote_addr;
proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto  $jt_fwd_proto;   # <- key setting for external-proxy mode

proxy_http_version 1.1;
proxy_set_header Connection "";
proxy_read_timeout 90s;
proxy_connect_timeout 5s;
proxy_send_timeout 60s;
proxy_buffering off;

# Hide the upstream (uvicorn) banner + its security headers, so this nginx's server-block
# add_header values are the single canonical source (no duplicate / stale headers — OWASP A05).
proxy_hide_header Server;
proxy_hide_header X-Powered-By;
proxy_hide_header Strict-Transport-Security;
proxy_hide_header Content-Security-Policy;
proxy_hide_header X-Frame-Options;
proxy_hide_header X-Content-Type-Options;
proxy_hide_header Referrer-Policy;
proxy_hide_header Permissions-Policy;
proxy_hide_header Cross-Origin-Opener-Policy;
proxy_hide_header Cross-Origin-Resource-Policy;
proxy_hide_header Cross-Origin-Embedder-Policy;
