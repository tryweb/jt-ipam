# =============================================================================
# jt-ipam — nginx site (external reverse proxy mode)
#
# Use when a front NGINX (or other LB) terminates SSL and this local NGINX
# serves HTTP only:
#   browser → HTTPS → external NGINX → HTTP:80 → local NGINX → 127.0.0.1:8000 → FastAPI
#
# Install (replaces the default jt-ipam.conf):
#   sudo cp deploy/nginx/jt-ipam-external-proxy.conf         /etc/nginx/sites-available/jt-ipam
#   sudo cp deploy/nginx/jt-ipam-external-proxy-snippet.conf /etc/nginx/snippets/jt-ipam-proxy.conf
#   sudo ln -sf /etc/nginx/sites-available/jt-ipam /etc/nginx/sites-enabled/jt-ipam
#   sudo nginx -t && sudo systemctl reload nginx
#
# Also make sure:
#   - In /etc/jt-ipam/backend.env set APP_PUBLIC_URL / API_PUBLIC_URL / CORS_ORIGINS
#     to your public domain (https://ipam.your-domain.com), not ipam.example.com
#   - The external NGINX forwards X-Forwarded-Proto $scheme (=https) and Host $host
#   - HSTS is sent by the external NGINX that holds the cert; this host does not send it (it is HTTP)
# =============================================================================
# NOTE: server_tokens is set per server{} block below, NOT here at http context —
# Debian 13's stock nginx.conf already sets "server_tokens off;" in http{}, and a
# duplicate in the same context is a fatal error.

limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=1200r/m;
limit_req_status 429;

map $sent_http_content_type $expires {
    default                 off;
    text/html               -1;
    ~image/                 30d;
    ~font/                  30d;
    application/javascript  7d;
    text/css                7d;
}

# The external proxy should send X-Forwarded-Proto; if it does not (empty), this
# mode sits behind a TLS-terminating proxy, so default it to https.
map $http_x_forwarded_proto $jt_fwd_proto {
    default $http_x_forwarded_proto;
    ""      https;
}

# WebSocket upgrade (used by the SSH terminal). Non-WS requests get "close".
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP (plaintext, dedicated port 8088) — serves only the Graylog DSV lookup table (same as default)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 8088;
    listen [::]:8088;
    server_name _;
    server_tokens off;

    location /api/v1/lookup/ {
        limit_req zone=api burst=80 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/jt-ipam-proxy.conf;
    }
    location / { return 404; }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP port 80 — receives forwards from the external NGINX (SSL already terminated
# upstream; this host does not 301-redirect and does not send HSTS)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    server_tokens off;

    # ── Security headers (A05) ── note: HSTS is NOT sent here; the external NGINX handles it
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org; font-src 'self' data:; connect-src 'self'; frame-src 'self' https://www.openstreetmap.org https://www.google.com https://maps.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # ── Frontend (static files from the Vite build) ──
    root /opt/jt-ipam/frontend/dist;
    index index.html;
    expires $expires;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # ── Reverse-proxy the API: apply rate limiting ──
    location /api/phpipam/user/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/jt-ipam-proxy.conf;
    }

    # jt-ipam-ssh-ws: SSH terminal WebSocket (long-lived). Sets headers explicitly
    # instead of include-ing jt-ipam-proxy.conf, because that snippet already sets
    # proxy_read_timeout (re-declaring it in the same block = "duplicate directive").
    # X-Forwarded-Proto uses $jt_fwd_proto (external-proxy mode receives plain HTTP).
    location ~ ^/api/v1/addresses/[0-9a-fA-F-]+/ssh/ws$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $jt_fwd_proto;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /api/ {
        limit_req zone=api burst=80 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/jt-ipam-proxy.conf;
    }

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block common sensitive paths ──
    location ~ /\.(env|git|svn|hg|DS_Store) {
        deny all;
        access_log off;
        return 404;
    }

    # ── Limit request size (A04) ──
    client_max_body_size 16m;
    client_body_timeout 30s;
    client_header_timeout 30s;
}
