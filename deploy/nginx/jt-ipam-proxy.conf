# Install path: /etc/nginx/snippets/jt-ipam-proxy.conf
proxy_http_version 1.1;
# Do not leak the upstream (uvicorn) Server / framework banner to clients (OWASP A05 / scanner "Tech Detected").
proxy_hide_header Server;
proxy_hide_header X-Powered-By;
# The backend (uvicorn middleware) also emits security headers — for direct/self-signed TLS mode.
# Behind nginx, strip them so the server-block add_header values are the single, canonical source
# (otherwise every proxied response carries each header twice → "multiple header entries" / stale CSP).
proxy_hide_header Strict-Transport-Security;
proxy_hide_header Content-Security-Policy;
proxy_hide_header X-Frame-Options;
proxy_hide_header X-Content-Type-Options;
proxy_hide_header Referrer-Policy;
proxy_hide_header Permissions-Policy;
proxy_hide_header Cross-Origin-Opener-Policy;
proxy_hide_header Cross-Origin-Resource-Policy;
proxy_hide_header Cross-Origin-Embedder-Policy;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Request-ID $request_id;
proxy_read_timeout 30s;
proxy_connect_timeout 5s;
proxy_buffering on;
