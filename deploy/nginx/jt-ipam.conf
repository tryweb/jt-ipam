# =============================================================================
# jt-ipam — nginx site
#
# Install path: /etc/nginx/sites-available/jt-ipam
# Enable: sudo ln -s /etc/nginx/sites-available/jt-ipam /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx
#
# OWASP A05: security headers + server_tokens off
#
# NOTE: server_tokens is set inside each server{} block below, NOT here at the
# http context. Debian 13's stock /etc/nginx/nginx.conf already ships
# "server_tokens off;" in its http{} block, and a second one in the *same*
# context is a fatal "directive is duplicate" error (older Debian/Ubuntu had it
# commented out, so this only surfaced on trixie). Setting it per-server
# coexists with / overrides any http-level value cleanly on every distro.
# =============================================================================

# Rate limiting (A04 / A07): stricter on the login endpoint
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=1200r/m;

map $sent_http_content_type $expires {
    default                 off;
    text/html               -1;
    ~image/                 30d;
    ~font/                  30d;
    application/javascript  7d;
    text/css                7d;
}

# WebSocket upgrade (used by the SSH terminal). Non-WS requests get "close".
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Return 429 (not the default 503) when a request is rate limited
limit_req_status 429;

# ─────────────────────────────────────────────────────────────────────────────
# HTTP — redirect to HTTPS (keep enabled in production)
# ─────────────────────────────────────────────────────────────────────────────
server {
    # default_server: overrides the default site left by "apt install nginx",
    # so any hostname / IP hits jt-ipam instead of the "Welcome to nginx" page.
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ipam.example.com;
    server_tokens off;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP (plaintext, dedicated port 8088) — serves only the Graylog DSV lookup table
#   Use this port if Graylog's "DSV File from HTTP" adapter cannot use HTTPS
#   (e.g. a self-signed cert). Note: the token travels in the query string, so
#   plaintext HTTP exposes it on the wire → trusted intranet only.
#   Comment out the whole server block if unused; change "listen" to switch ports
#   (keep the frontend settings page in sync).
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 8088;
    listen [::]:8088;
    server_name _;
    server_tokens off;

    # Expose only the lookup endpoint; everything else returns 404.
    location /api/v1/lookup/ {
        limit_req zone=api burst=80 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/jt-ipam-proxy.conf;
    }
    location / { return 404; }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — main site
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name ipam.example.com;

    # ── TLS (A04) ──
    # Defaults point at /etc/jt-ipam/tls/server.{crt,key}
    # Self-signed: generated by scripts/generate-self-signed-cert.sh
    # Production: cp the real cert to the same paths, then systemctl reload nginx
    # Or for Let's Encrypt: point ssl_certificate at /etc/letsencrypt/live/{FQDN}/{fullchain,privkey}.pem
    ssl_certificate     /etc/jt-ipam/tls/server.crt;
    ssl_certificate_key /etc/jt-ipam/tls/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers (A05) ──
    server_tokens off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # No external map tiles (the locations map is self-contained) → zero cross-origin subresources, require-corp is safe.
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # ── Frontend (static files from the Vite build) ──
    root /opt/jt-ipam/frontend/dist;
    index index.html;
    expires $expires;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # ── Reverse-proxy the API: apply rate limiting ──
    location /api/phpipam/user/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/jt-ipam-proxy.conf;
    }

    # jt-ipam-conn-ws: SSH + RDP + VNC console WebSocket (long-lived). Sets headers explicitly
    # instead of include-ing jt-ipam-proxy.conf, because that snippet already sets
    # proxy_read_timeout (re-declaring it in the same block = "duplicate directive").
    location ~ ^/api/v1/addresses/[0-9a-fA-F-]+/(ssh|rdp|vnc|novnc)/ws$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Request-ID       $request_id;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /api/ {
        limit_req zone=api burst=80 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/jt-ipam-proxy.conf;
    }

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block common sensitive paths ──
    location ~ /\.(env|git|svn|hg|DS_Store) {
        deny all;
        access_log off;
        return 404;
    }

    # ── Limit request size (A04) ──
    client_max_body_size 16m;
    client_body_timeout 30s;
    client_header_timeout 30s;
}
