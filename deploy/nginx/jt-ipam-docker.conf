# jt-ipam — nginx config for Docker Compose deployment
#
# Serves the built frontend (Vue 3 SPA) and reverse-proxies /api/
# to the backend container. No TLS — terminate TLS at an external
# reverse proxy (Traefik / Caddy / another nginx) or mount certs
# and add listen 443 ssl to this file.
#
upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    server_tokens off;

    # ── Security headers (A05) ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    # CSP is also set by the backend; setting it at nginx as well provides defence-in-depth
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org; font-src 'self' data:; connect-src 'self'; frame-src 'self' https://www.openstreetmap.org https://www.google.com https://maps.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Request size limit (A04)
    client_max_body_size 16m;

    # ── Frontend (static files) ──
    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # ── Reverse-proxy API ──
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
    }

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block sensitive paths ──
    location ~ /\.(env|git|svn|hg|DS_Store) {
        deny all;
        access_log off;
        return 404;
    }
}
